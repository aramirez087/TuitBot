name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

      - name: Conformance gates
        run: |
          cargo test -p tuitbot-mcp conformance_all_kernel_tools
          cargo test -p tuitbot-mcp golden_snapshot_matches
          cargo test -p tuitbot-mcp session09_expanded_benchmark
          cargo test -p tuitbot-mcp eval_session09_all_scenarios
        env:
          RUSTFLAGS: "-D warnings"
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd dashboard && npm ci

      - name: Type check
        run: cd dashboard && npm run check

      - name: Build
        run: cd dashboard && npm run build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Rust security audit (--deny warnings)
        # .cargo/audit.toml holds explicit RUSTSEC ignores for known false positives.
        # --deny warnings blocks advisory warnings (not just vulnerabilities).
        run: cargo audit --deny warnings

      - name: Setup Node.js for npm audit
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend npm audit (high severity)
        # Fails on high/critical vulnerabilities only. Moderate issues are
        # reported but do not block CI (use Dependabot PRs to track them).
        run: cd dashboard && npm audit --audit-level=high

  manifest-sync:
    name: MCP manifest sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check MCP manifests
        run: bash scripts/check-mcp-manifests.sh
        env:
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'
