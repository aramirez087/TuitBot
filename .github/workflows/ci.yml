name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mcp: ${{ steps.filter.outputs.mcp }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
            frontend:
              - 'dashboard/src/**'
              - 'dashboard/package.json'
              - 'dashboard/package-lock.json'
              - 'dashboard/svelte.config.js'
              - 'dashboard/vite.config.ts'
              - 'dashboard/tsconfig.json'
            mcp:
              - 'crates/tuitbot-mcp/**'
              - 'crates/tuitbot-core/**'
            tauri:
              - 'dashboard/src-tauri/**'
              - 'dashboard/package.json'
              - 'dashboard/package-lock.json'

  test:
    name: Test (${{ matrix.os }})
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace
        env:
          RUSTFLAGS: "-D warnings"
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

      - name: Conformance gates
        if: needs.detect-changes.outputs.mcp == 'true'
        run: |
          cargo test -p tuitbot-mcp conformance_all_kernel_tools
          cargo test -p tuitbot-mcp golden_snapshot_matches
          cargo test -p tuitbot-mcp session09_expanded_benchmark
          cargo test -p tuitbot-mcp eval_session09_all_scenarios
        env:
          RUSTFLAGS: "-D warnings"
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  frontend:
    name: Frontend checks
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd dashboard && npm ci && npm i --prefer-offline

      - name: Type check
        run: cd dashboard && npm run check

      - name: Build
        run: cd dashboard && npm run build

  tauri-clippy:
    name: Tauri clippy linter
    needs: detect-changes
    if: needs.detect-changes.outputs.tauri == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Install GTK3 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dashboard/src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('dashboard/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Run clippy on src-tauri
        run: cd dashboard/src-tauri && cargo clippy -- -D warnings
        env:
          RUSTFLAGS: "-D warnings"

  release-verify:
    name: Validate release-plz and cargo package
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-verify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-verify-
            ${{ runner.os }}-cargo-

      - name: Install release-plz
        run: |
          RELEASE_PLZ_VER=0.3.157
          curl -fsSL "https://github.com/release-plz/release-plz/releases/download/release-plz-v${RELEASE_PLZ_VER}/release-plz-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/release-plz.tar.gz
          mkdir -p /tmp/rplz && tar -xzf /tmp/release-plz.tar.gz -C /tmp/rplz
          echo "/tmp/rplz" >> $GITHUB_PATH

      - name: Run release-plz update (dry run)
        run: release-plz update --config release-plz.toml --allow-dirty --dry-run

      - name: Run cargo package (verify metadata)
        run: cargo package --workspace --allow-dirty
        env:
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'

  audit:
    name: Security audit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit (fail on unsound)
        continue-on-error: true  # Report but don't block CI (unmaintained/yanked are informational)
        run: |
          {
            echo "## 🔒 Cargo Audit Report"
            echo ""
            cargo audit 2>&1
          } | tee -a $GITHUB_STEP_SUMMARY
          # Enforce only on actual safety issues (unsound), not informational (unmaintained, yanked)
          cargo audit --deny unsound

  # ── Frontend / npm security audit ──
  audit-npm:
    name: Security audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            dashboard/package-lock.json
            plugins/openclaw-tuitbot/package-lock.json

      - name: Check dashboard dependencies
        run: cd dashboard && npm audit --audit-level=moderate
        continue-on-error: true  # report but don't block CI

      - name: Check plugin dependencies
        run: cd plugins/openclaw-tuitbot && npm audit --audit-level=moderate 2>/dev/null || echo "Plugin dir not found or no vulnerabilities"
        continue-on-error: true

  # ── License compliance check ──
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Check Rust licenses
        run: |
          echo "## Rust Dependencies" >> $GITHUB_STEP_SUMMARY
          cargo license --json | jq -r '.[] | "\(.name) (\(.license))"' | sort | uniq \
            >> $GITHUB_STEP_SUMMARY || echo "License scan completed"

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check npm licenses
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## npm Dependencies" >> $GITHUB_STEP_SUMMARY
          cd dashboard && license-checker --json | jq -r 'keys | .[]' | head -20 >> $GITHUB_STEP_SUMMARY || echo "npm licenses checked"

  # ── SBOM generation (CycloneDX) ──
  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-sbom-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sbom-

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate Rust SBOM (CycloneDX)
        run: |
          cargo sbom --workspace --format cyclonedx-json > sbom-rust.json || echo "{}" > sbom-rust.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.run_id }}
          path: sbom-*.json
          retention-days: 90

  manifest-sync:
    name: MCP manifest sync
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check MCP manifests
        run: bash scripts/check-mcp-manifests.sh
        env:
          TUITBOT_SKIP_DASHBOARD_BUILD: '1'
