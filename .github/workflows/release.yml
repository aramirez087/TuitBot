name: Release

on:
  push:
    branches: [main]
    tags:
      - 'app-v*'  # Desktop app releases
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing CLI or server release tag to backfill assets for
        required: false
        type: string
      build_desktop:
        description: Manually trigger desktop build (for app-v* tags)
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  release-context:
    name: Release context
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_release_pr_push: ${{ steps.detect.outputs.is_release_pr_push }}
    steps:
      - name: Detect merged release PR push
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          is_release_pr_push=false

          if [ "$EVENT_NAME" = "push" ]; then
            prs="$(gh api "repos/$GH_REPO/commits/$GH_SHA/pulls" 2>/dev/null || echo '[]')"
            if echo "$prs" | jq -e 'any(.[]?; any(.labels[]?; .name == "release"))' >/dev/null; then
              is_release_pr_push=true
            fi
          fi

          echo "is_release_pr_push=$is_release_pr_push" >> "$GITHUB_OUTPUT"

  release:
    name: Release (tag + GitHub Release)
    needs: release-context
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || needs.release-context.outputs.is_release_pr_push == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      asset_release_ready: ${{ steps.release-meta.outputs.asset_release_ready || 'false' }}
      release_package: ${{ steps.release-meta.outputs.package }}
      release_tag: ${{ steps.release-meta.outputs.tag }}
      release_version: ${{ steps.release-meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard for embedding
        run: |
          cd dashboard && npm ci && npm run build
          mkdir -p ../crates/tuitbot-server/dashboard-dist
          cp -r build/* ../crates/tuitbot-server/dashboard-dist/

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Resolve released tag metadata
        id: release-meta
        env:
          RELEASES_JSON: ${{ steps.release-plz.outputs.releases || '[]' }}
          GITHUB_SHA: ${{ github.sha }}
          BACKFILL_RELEASE_TAG: ${{ inputs.release_tag || '' }}
        run: |
          set -euo pipefail
          package=""
          tag=""
          version=""
          selected_release=""

          if [ -n "$BACKFILL_RELEASE_TAG" ]; then
            case "$BACKFILL_RELEASE_TAG" in
              tuitbot-cli-v*)
                package="tuitbot-cli"
                tag="$BACKFILL_RELEASE_TAG"
                version="${BACKFILL_RELEASE_TAG#tuitbot-cli-v}"
                ;;
              tuitbot-server-v*)
                package="tuitbot-server"
                tag="$BACKFILL_RELEASE_TAG"
                version="${BACKFILL_RELEASE_TAG#tuitbot-server-v}"
                ;;
              *)
                echo "::error::Unsupported backfill release tag: $BACKFILL_RELEASE_TAG"
                exit 1
                ;;
            esac
            echo "Using workflow_dispatch backfill tag $tag."
          else
            selected_release="$(echo "$RELEASES_JSON" | jq -r '
              map(select(.package_name == "tuitbot-cli" or .package_name == "tuitbot-server"))
              | sort_by(if .package_name == "tuitbot-cli" then 0 else 1 end)
              | .[0]?
              | if . == null then empty else "\(.package_name)\t\(.tag)\t\(.version)" end
            ')"
          fi

          if [ -n "$selected_release" ]; then
            IFS=$'\t' read -r package tag version <<< "$selected_release"
            echo "Using release-plz metadata for $package ($tag)."
          elif [ -z "$tag" ]; then
            echo "No asset-bearing release reported by release-plz; checking tagged merge parents for a rerun/backfill target."
            parents="$(git rev-list --parents -n 1 "$GITHUB_SHA" | cut -d' ' -f2-)"
            asset_tags="$(
              {
                git tag --points-at "$GITHUB_SHA"
                for commit in $parents; do
                  git tag --points-at "$commit"
                done
              } | sort -u | grep -E '^(tuitbot-cli|tuitbot-server)-v' || true
            )"

            while IFS= read -r candidate; do
              case "$candidate" in
                tuitbot-cli-v*)
                  package="tuitbot-cli"
                  tag="$candidate"
                  version="${candidate#tuitbot-cli-v}"
                  break
                  ;;
              esac
            done <<< "$asset_tags"

            if [ -z "$tag" ]; then
              while IFS= read -r candidate; do
                case "$candidate" in
                  tuitbot-server-v*)
                    package="tuitbot-server"
                    tag="$candidate"
                    version="${candidate#tuitbot-server-v}"
                    break
                    ;;
                esac
              done <<< "$asset_tags"
            fi
          fi

          if [ -z "$tag" ] || [ -z "$version" ]; then
            echo "No tuitbot-cli or tuitbot-server release found for asset publication."
            echo "release-plz output: $RELEASES_JSON"
            echo "asset_release_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "asset_release_ready=true" >> "$GITHUB_OUTPUT"
          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release-pr:
    name: Release PR (next version)
    needs: release-context
    if: github.event_name == 'push' && needs.release-context.outputs.is_release_pr_push != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update dashboard release marker
        run: bash scripts/update-dashboard-release-marker.sh

      - name: Build dashboard for embedding
        run: |
          cd dashboard && npm ci && npm run build
          mkdir -p ../crates/tuitbot-server/dashboard-dist
          cp -r build/* ../crates/tuitbot-server/dashboard-dist/

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  build-assets:
    name: Build release asset (${{ matrix.target }})
    needs: release
    if: needs.release.outputs.asset_release_ready == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Clean cached aarch64 target artifacts
        if: matrix.cross
        run: cargo clean --target aarch64-unknown-linux-gnu

      - name: Build tuitbot binary
        if: ${{ matrix.cross != true }}
        run: cargo build --locked --release --package tuitbot-cli --target ${{ matrix.target }}

      - name: Build tuitbot binary (aarch64-linux cross)
        if: matrix.cross
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # boring-sys2 v4.15.15 incorrectly resolves CMAKE_TOOLCHAIN_FILE using
          # the host triple during cross-compilation. Keep the correct target
          # var and add the host-scoped fallback so its build script does not
          # override the custom toolchain file with its bundled Linux stub.
          CMAKE_TOOLCHAIN_FILE_aarch64_unknown_linux_gnu: ${{ github.workspace }}/.github/cmake/aarch64-unknown-linux-gnu.cmake
          CMAKE_TOOLCHAIN_FILE_x86_64_unknown_linux_gnu: ${{ github.workspace }}/.github/cmake/aarch64-unknown-linux-gnu.cmake
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          RANLIB_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ranlib
        run: cargo build --locked --release --package tuitbot-cli --target ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard for server embedding
        run: |
          cd dashboard && npm ci && npm run build
          mkdir -p ../crates/tuitbot-server/dashboard-dist
          cp -r build/* ../crates/tuitbot-server/dashboard-dist/

      - name: Build tuitbot-server binary
        if: ${{ matrix.cross != true }}
        run: cargo build --locked --release --package tuitbot-server --target ${{ matrix.target }}

      - name: Build tuitbot-server binary (aarch64-linux cross)
        if: matrix.cross
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # boring-sys2 v4.15.15 resolves this through the host triple.
          CMAKE_TOOLCHAIN_FILE_aarch64_unknown_linux_gnu: ${{ github.workspace }}/.github/cmake/aarch64-unknown-linux-gnu.cmake
          CMAKE_TOOLCHAIN_FILE_x86_64_unknown_linux_gnu: ${{ github.workspace }}/.github/cmake/aarch64-unknown-linux-gnu.cmake
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          RANLIB_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ranlib
        run: cargo build --locked --release --package tuitbot-server --target ${{ matrix.target }}

      - name: Package CLI archive (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          STRIP: ${{ matrix.cross && 'aarch64-linux-gnu-strip' || 'strip' }}
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${TARGET}/release/tuitbot" "dist/package/tuitbot"
          cp README.md LICENSE dist/package/
          $STRIP dist/package/tuitbot || true
          tar -czf "dist/tuitbot-${TARGET}.tar.gz" -C dist/package tuitbot README.md LICENSE

      - name: Package server archive (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
          STRIP: ${{ matrix.cross && 'aarch64-linux-gnu-strip' || 'strip' }}
        run: |
          set -euo pipefail
          mkdir -p dist/server-package
          cp "target/${TARGET}/release/tuitbot-server" "dist/server-package/tuitbot-server"
          cp README.md LICENSE dist/server-package/
          $STRIP dist/server-package/tuitbot-server || true
          tar -czf "dist/tuitbot-server-${TARGET}.tar.gz" -C dist/server-package tuitbot-server README.md LICENSE

      - name: Package CLI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/$env:TARGET/release/tuitbot.exe" "dist/package/tuitbot.exe"
          Copy-Item README.md "dist/package/README.md"
          Copy-Item LICENSE "dist/package/LICENSE"
          Compress-Archive -Path dist/package/* -DestinationPath "dist/tuitbot-$env:TARGET.zip" -Force

      - name: Package server archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/server-package | Out-Null
          Copy-Item "target/$env:TARGET/release/tuitbot-server.exe" "dist/server-package/tuitbot-server.exe"
          Copy-Item README.md "dist/server-package/README.md"
          Copy-Item LICENSE "dist/server-package/LICENSE"
          Compress-Archive -Path dist/server-package/* -DestinationPath "dist/tuitbot-server-$env:TARGET.zip" -Force

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuitbot-${{ matrix.target }}
          path: dist/tuitbot-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuitbot-server-${{ matrix.target }}
          path: dist/tuitbot-server-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - release
      - build-assets
    if: ${{ !cancelled() && needs.release.outputs.asset_release_ready == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tuitbot-*
          merge-multiple: true
          path: dist

      - name: Verify complete release asset set
        env:
          BUILD_ASSETS_RESULT: ${{ needs.build-assets.result }}
        run: |
          set -euo pipefail
          expected=(
            tuitbot-x86_64-unknown-linux-gnu.tar.gz
            tuitbot-server-x86_64-unknown-linux-gnu.tar.gz
            tuitbot-aarch64-unknown-linux-gnu.tar.gz
            tuitbot-server-aarch64-unknown-linux-gnu.tar.gz
            tuitbot-x86_64-apple-darwin.tar.gz
            tuitbot-server-x86_64-apple-darwin.tar.gz
            tuitbot-aarch64-apple-darwin.tar.gz
            tuitbot-server-aarch64-apple-darwin.tar.gz
            tuitbot-x86_64-pc-windows-msvc.zip
            tuitbot-server-x86_64-pc-windows-msvc.zip
          )
          missing=()
          for asset in "${expected[@]}"; do
            if [ ! -f "dist/$asset" ]; then
              missing+=("$asset")
            fi
          done

          echo "Downloaded release archives:"
          find dist -maxdepth 1 -type f \
            \( -name 'tuitbot-*.tar.gz' -o -name 'tuitbot-*.zip' -o -name 'tuitbot-server-*.tar.gz' -o -name 'tuitbot-server-*.zip' \) \
            -printf '%f\n' | sort

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing expected release assets."
            printf '%s\n' "${missing[@]}"
            exit 1
          fi

          if [ "$BUILD_ASSETS_RESULT" != "success" ]; then
            echo "::error::build-assets result was $BUILD_ASSETS_RESULT; refusing to publish."
            exit 1
          fi

      - name: Build checksum manifest
        run: |
          set -euo pipefail
          cd dist
          sha256sum tuitbot-* > SHA256SUMS

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG."
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --notes "Automated release asset publication." \
              --repo "$GH_REPO"
          fi

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" dist/* --clobber --repo "$GH_REPO"

  # ── Desktop app build (Tauri) — triggered on app-v* tags ──
  build-desktop:
    name: Build desktop app (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/app-v') || github.event.inputs.build_desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and Tauri build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dashboard/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-tauri-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: cd dashboard && npm ci

      - name: Build Tauri app
        run: cd dashboard && npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tuitbot-desktop-${{ matrix.target }}
          path: dashboard/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 30
