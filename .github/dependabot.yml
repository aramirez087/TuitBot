version: 2
updates:
  # Cargo dependencies - weekly, grouped by ecosystem
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "rust"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-dependencies:
        patterns:
          - "*"
    allow:
      - dependency-type: "indirect"
      - dependency-type: "direct"
    ignore:
      - dependency-name: "criterion"
        # Keep criterion updates manual for benchmark verification
      - dependency-name: "toml"
        versions: ["0.9.*", ">=1.0"]
        # toml 0.9 (TOML spec 1.1) is a breaking change — upgrade requires
        # migrating commands::upgrade TOML parsing. Track separately.

  # npm dependencies - dashboard (weekly)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): dashboard"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # npm dependencies - openclaw plugin (weekly)
  - package-ecosystem: "npm"
    directory: "/plugins/openclaw-tuitbot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
    labels:
      - "dependencies"
      - "openclaw-plugin"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): openclaw plugin"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # GitHub Actions - monthly (less churn)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci): actions"
