version: 2
updates:
  # Cargo dependencies - weekly, grouped by ecosystem
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "rust"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group all non-breaking updates together to reduce PR noise
      - dependency-type: "all"
        patterns:
          - "*"
    # Allow auto-merging for patch updates (non-breaking)
    allow:
      - dependency-type: "indirect"
      - dependency-type: "direct"
    # Skip dev dependencies that are only for testing
    ignore:
      - dependency-name: "criterion"
        # Keep criterion updates manual for benchmark verification

  # npm dependencies - dashboard (weekly)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): dashboard"
    groups:
      - dependency-type: "all"
        patterns:
          - "*"

  # npm dependencies - openclaw plugin (weekly)
  - package-ecosystem: "npm"
    directory: "/plugins/openclaw-tuitbot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
    labels:
      - "dependencies"
      - "openclaw-plugin"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): openclaw plugin"
    groups:
      - dependency-type: "all"
        patterns:
          - "*"

  # GitHub Actions - monthly (less churn)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "first"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "aramirez087"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci): actions"
