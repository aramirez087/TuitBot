version: 2
updates:
  # Rust workspace (root Cargo.toml)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # SvelteKit dashboard (dashboard/)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # OpenClaw plugin (plugins/openclaw-tuitbot/)
  - package-ecosystem: "npm"
    directory: "/plugins/openclaw-tuitbot"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "plugin"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
