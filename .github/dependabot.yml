version: 2
updates:
  # ── Rust / Cargo ──────────────────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Costa_Rica"
    allow:
      - dependency-type: "direct"
    reviewers:
      - "aramirez087"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Costa_Rica"
    reviewers:
      - "aramirez087"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # ── Node.js / dashboard ───────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Costa_Rica"
    allow:
      - dependency-type: "direct"
    reviewers:
      - "aramirez087"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10

  # ── Node.js / openclaw plugin ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/plugins/openclaw-tuitbot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Costa_Rica"
    allow:
      - dependency-type: "direct"
    reviewers:
      - "aramirez087"
    labels:
      - "dependencies"
      - "plugin"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
