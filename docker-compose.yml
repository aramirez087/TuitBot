# =============================================================================
# docker-compose.yml — Tuitbot self-hosted quick-start
#
# Usage:
#   1. Copy config.example.toml to ~/.tuitbot/config.toml and fill in keys.
#   2. docker compose up -d
#   3. Dashboard API: http://localhost:3001
#
# Docs: https://github.com/aramirez087/TuitBot
# =============================================================================

services:
  tuitbot:
    image: ghcr.io/aramirez087/tuitbot:latest
    container_name: tuitbot
    restart: unless-stopped

    ports:
      # Dashboard REST API
      - "3001:3001"

    volumes:
      # Persist config, SQLite DB, and API token between restarts.
      # Create this directory first and place your config.toml inside it.
      - "${TUITBOT_DATA_DIR:-${HOME}/.tuitbot}:/data"

    environment:
      # Forward RUST_LOG so you can control log verbosity without rebuilding.
      RUST_LOG: "${RUST_LOG:-info}"
      # TUITBOT_CONFIG is set inside the image; override here if needed.
      # TUITBOT_CONFIG: /data/config.toml

    # Healthcheck: poll the /health endpoint every 30 s.
    # Unhealthy containers are automatically restarted by Docker.
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
